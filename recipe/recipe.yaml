# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "1.19.0"
  # a few places _say_ 25.0, but not available on all conda-forge platforms
  erlang_min: "26"

package:
  name: elixir
  version: ${{ version }}

source:
  url: https://github.com/elixir-lang/elixir/archive/v${{ version }}.tar.gz
  sha256: 99a684045b49f9c5005a1aa8278e1bac8c3769e0a5a13c05ef80b69113029234

build:
  number: 0
  skip: win
  script:
    - make prefix=${PREFIX} install

requirements:
  build:
    - git
    - make
  host:
    - erlang ${{ erlang_min }}.*
  run:
    - erlang >=${{ erlang_min }}

tests:
  - requirements:
      run:
        - erlang ${{ erlang_min }}.*
    script:
      - elixir --version
      - mix --version
  - requirements:
      run:
        - erlang !=${{ erlang_min }}.*
    script:
      - elixir --version
      - mix --version

about:
  license: Apache-2.0
  license_file: LICENSE
  summary: Elixir is a dynamic, functional language designed for building scalable and maintainable applications
  homepage: https://elixir-lang.org
  repository: https://github.com/elixir-lang/elixir
  documentation: https://elixir-lang.org/docs.html

extra:
  recipe-maintainers:
    - bollwyvl
